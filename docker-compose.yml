version: "3.9"

services:
  app:
    build: .
    ports:
      - "3001:3000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - RABBITMQ_URL=amqp://rabbitmq
    env_file:
      - .env
    depends_on:
      - rabbitmq
    networks:
      - backend

  consumer:
    build:
      context: .
      dockerfile: modules/Dockerfile
    environment:
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend

networks:
  backend:
    driver: bridge
